<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Juguetona - Bombo Legüero y Batería</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #0b0b0b; color: #ffffff; padding: 20px 15px; display: flex; justify-content: center; min-height: 100vh; }
        #main-content {
            width: 100%; max-width: 600px;
            background-color: #121212; border: 1px solid #222;
            border-radius: 16px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px; margin-top: 20px;
        }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .header h1 { font-size: 1.6rem; color: #d4af37; margin-bottom: 5px; }
        .header p { color: #888; font-size: 0.95rem; }
        .video-player-container { width: 100%; background-color: #000; border-radius: 12px; overflow: hidden; border: 1px solid #333; margin-bottom: 25px; aspect-ratio: 16 / 9; }
        .video-player-container iframe { width: 100%; height: 100%; border: none; display: block; }
        .playlist-title { font-size: 1.1rem; color: #fff; margin-bottom: 15px; font-weight: 600; }
        .playlist { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .class-item { display: flex; align-items: center; background-color: #1a1a1a; border: 1px solid #262626; border-radius: 10px; padding: 15px; cursor: pointer; transition: border-color 0.2s; }
        .class-item:hover { border-color: #d4af37; }
        .class-item.active { border-color: #d4af37; background-color: #222; }
        .icon-play { width: 35px; height: 35px; background-color: #262626; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 15px; color: #d4af37; flex-shrink: 0; font-size: 12px; }
        .class-item.active .icon-play { background-color: #d4af37; color: #000; }
        .class-info { flex-grow: 1; }
        .class-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
        .class-meta { font-size: 0.8rem; color: #777; }
        .download-box { border-top: 1px solid #222; padding-top: 20px; text-align: center; }
        .btn-download { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: linear-gradient(135deg, #d4af37 0%, #aa841c 100%); color: #000; text-decoration: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 1rem; }
        .btn-download:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="header">
            <h1>LA JUGUETONA</h1>
            <p>Para Bombo Legüero y Batería • Prof. Alejandro Brukman</p>
        </div>

        <div class="video-player-container">
            <iframe id="main-video" 
                src="https://www.youtube.com/embed/Mx6o0ZeHUZM?enablejsapi=1" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <h2 class="playlist-title">Clases Disponibles</h2>
        <div class="playlist">
            <div class="class-item active" onclick="changeVideo('Mx6o0ZeHUZM', this)">
                <div class="icon-play">▶</div>
                <div class="class-info">
                    <div class="class-name">Ejercicios en Bombo Legüero</div>
                    <div class="class-meta">Video</div>
                </div>
            </div>
            <div class="class-item" onclick="changeVideo('cFfDBUrRywU', this)">
                <div class="icon-play">▶</div>
                <div class="class-info">
                    <div class="class-name">Chacarera Simple en Bombo Legüero</div>
                    <div class="class-meta">Video</div>
                </div>
            </div>
            <div class="class-item" onclick="changeVideo('NYyrQm8UbXs', this)">
                <div class="icon-play">▶</div>
                <div class="class-info">
                    <div class="class-name">Chacarera Simple en Batería - La Juguetona</div>
                    <div class="class-meta">Video</div>
                </div>
            </div>
        </div>

        <div class="download-box">
            <a href="La Juguetona - Chacarera Simple en Batería y Bombo Legüero (Black Edition).pdf" class="btn-download" download>
                📥 Descargar PDF de Partituras de La Juguetona
            </a>
        </div>
    </div>

    <script>
        function changeVideo(youtubeId, element) {
            const videoIframe = document.getElementById('main-video');
            videoIframe.src = "https://www.youtube.com/embed/" + youtubeId + "?enablejsapi=1&autoplay=1";
            document.querySelectorAll('.class-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>

</body>
</html>
