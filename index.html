<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ale Brukman | Músico y Educador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { accent: '#b75229', 'accent-hover': '#9c411f' } } } }
    </script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0d0d0d; }
        .font-serif-criolla { font-family: 'Playfair Display', 'Georgia', serif; }
    </style>
</head>
<body class="text-gray-200 bg-[#0d0d0d]">

    <header class="border-b border-neutral-800 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl font-black text-white">AB</span>
            </div>
            <nav class="hidden md:flex space-x-8 text-sm font-bold uppercase tracking-wide">
                <a href="#inicio" class="hover:text-[#b75229] transition-colors">Inicio</a>
                <a href="#productos" class="hover:text-[#b75229] transition-colors">El Método</a>
            </nav>
            <a href="producto.html" class="bg-accent hover:bg-accent-hover text-white text-xs font-bold uppercase px-4 py-2 rounded transition-all">
                Ver Producto
            </a>
        </div>
    </header>

    <section id="inicio" class="max-w-6xl mx-auto px-4 py-24 grid md:grid-cols-2 gap-12 items-center">
        <div class="space-y-6">
            <h1 class="text-6xl md:text-8xl text-white font-serif-criolla leading-none">Aprendé <br><span class="italic text-[#d49a55]">a tu ritmo</span></h1>
            <p class="text-neutral-400 text-lg">Productos descargables de Bombo Legüero y Batería.</p>
            <a href="producto.html" class="inline-block bg-[#d49a55] hover:bg-[#bd8443] text-black font-bold uppercase text-xs tracking-widest px-8 py-4 transition-all">
                Ver Producto Destacado
            </a>
        </div>
        <div class="flex justify-center md:justify-end">
            <img src="Alejandro.jpg" alt="Alejandro Brukman" class="w-full max-w-sm rounded-[2rem] grayscale hover:grayscale-0 transition-all duration-500">
        </div>
    </section>

    <section id="productos" class="max-w-6xl mx-auto px-4 py-24">
        <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-8 grid md:grid-cols-12 gap-8 items-center">
            <div class="md:col-span-4">
                <img src="juguetona portada.jpg" alt="Portada" class="w-full rounded-xl shadow-lg">
            </div>
            <div class="md:col-span-8 space-y-4">
                <h2 class="text-3xl font-black">LA JUGUETONA</h2>
                <p class="text-neutral-400">Chacarera Simple en Batería y Bombo Legüero. 10 ejercicios interactivos.</p>
                <a href="producto.html" class="inline-block bg-accent hover:bg-accent-hover text-white font-bold uppercase text-xs px-6 py-3 rounded-lg transition-all">
                    Ver Detalles del Producto
                </a>
            </div>
        </div>
    </section>

</body>
</html>
