<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Juguetona | Ale Brukman</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d0d0d] text-white py-12 px-4">
    <div class="max-w-5xl mx-auto">
        <a href="index.html" class="text-neutral-400 hover:text-white mb-8 inline-block">&larr; Volver al inicio</a>
        
        <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-8 md:p-16 shadow-2xl">
            <h1 class="text-4xl md:text-6xl font-black mb-8">La Juguetona</h1>
            
            <div class="mb-12">
                <img src="producto-videos.jpeg" alt="Interfaz de Video del Producto" class="w-full rounded-2xl border border-neutral-700 shadow-lg">
            </div>
            
            <div class="grid md:grid-cols-2 gap-12">
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold">Detalles del Curso</h2>
                    <p class="text-neutral-300 leading-relaxed">
                        Contiene 10 Ejercicios interactivos en video grabados en primera persona, 
                        acompañados por la partitura rítmica completa y desglosada de la Juguetona. 
                        Diseñado para un aprendizaje fluido y visual.
                    </p>
                </div>
                <div class="bg-black p-8 rounded-2xl border border-neutral-800 flex flex-col justify-center items-center text-center">
                    <span class="text-sm text-neutral-500 uppercase tracking-widest mb-2">Precio</span>
                    <span class="text-5xl font-black mb-6">$20.000 <span class="text-xl font-normal text-neutral-400">ARS</span></span>
                    <button class="bg-[#b75229] hover:bg-[#9c411f] w-full py-4 rounded-xl font-bold uppercase tracking-wider transition-all">
                        Confirmar Compra
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
